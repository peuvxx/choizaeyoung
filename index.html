<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>choizaeyoung</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; }
  #container { position: fixed; width: 100%; height: 100%; top: 0; left: 0; }
  #video { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
  #bgCanvas, #mainCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  #offCanvas { display: none; }
  #loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: #ff28b4; font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase;
    animation: blink 1.2s ease-in-out infinite; z-index: 20;
    text-align: center; line-height: 2;
  }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="bgCanvas"></canvas>
  <canvas id="mainCanvas"></canvas>
  <canvas id="offCanvas"></canvas>
  <div id="loading">LOADING...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
const video      = document.getElementById('video');
const bgCanvas   = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const offCanvas  = document.getElementById('offCanvas');
const bgCtx      = bgCanvas.getContext('2d');
const ctx        = mainCanvas.getContext('2d');
const offCtx     = offCanvas.getContext('2d');
const loadingEl  = document.getElementById('loading');

// ── 리사이즈 ──────────────────────────────────────────────────
function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  bgCanvas.width = mainCanvas.width = W;
  bgCanvas.height = mainCanvas.height = H;
  offCanvas.width = W; offCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);
// iOS 주소창 숨겨질 때도 대응
window.addEventListener('orientationchange', () => setTimeout(resize, 300));

// ── 모바일 감지 ───────────────────────────────────────────────
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// ── 카메라 직접 시작 (getUserMedia) ──────────────────────────
async function startCamera() {
  // 모바일: 전면카메라 / 데스크탑: 기본 카메라
  const constraints = {
    video: {
      facingMode: isMobile ? 'user' : 'environment',
      width:  { ideal: isMobile ? 1280 : 1920 },
      height: { ideal: isMobile ? 720  : 1080 },
    },
    audio: false,
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });
    video.play();
  } catch (e) {
    // facingMode 실패 시 fallback
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
      await new Promise(res => { video.onloadedmetadata = res; });
      video.play();
    } catch (e2) {
      loadingEl.textContent = 'CAMERA\nACCESS\nREQUIRED';
    }
  }
}

// ── 배경: 카메라 + 십자 그리드 ───────────────────────────────
function drawBackground() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0, 0, W, H);

  // 카메라 피드 (좌우반전 — 전면카메라 셀카 방향)
  bgCtx.save();
  bgCtx.translate(W, 0);
  bgCtx.scale(-1, 1);
  bgCtx.drawImage(video, 0, 0, W, H);
  bgCtx.restore();

  // 십자(+) 그리드
  const gap = 22, arm = 3.5;
  bgCtx.strokeStyle = 'rgba(255,30,170,0.28)';
  bgCtx.lineWidth = 1.0;
  bgCtx.lineCap = 'round';
  for (let x = gap; x < W; x += gap) {
    for (let y = gap; y < H; y += gap) {
      bgCtx.beginPath();
      bgCtx.moveTo(x-arm, y); bgCtx.lineTo(x+arm, y); bgCtx.stroke();
      bgCtx.beginPath();
      bgCtx.moveTo(x, y-arm); bgCtx.lineTo(x, y+arm); bgCtx.stroke();
    }
  }
}

// ── 열화상 컬러맵 ─────────────────────────────────────────────
function thermalColor(lum) {
  const stops = [
    [0.00, [8,8,8]],
    [0.18, [90,0,50]],
    [0.35, [210,10,130]],
    [0.52, [255,40,170]],
    [0.68, [255,200,0]],
    [0.82, [160,255,0]],
    [1.00, [210,255,80]],
  ];
  for (let i = 0; i < stops.length-1; i++) {
    const [t0,c0]=stops[i], [t1,c1]=stops[i+1];
    if (lum>=t0 && lum<=t1) {
      const f=(lum-t0)/(t1-t0);
      return c0.map((v,j)=>Math.round(v+(c1[j]-v)*f));
    }
  }
  return stops[stops.length-1][1];
}

// ── 도형 그리기 ───────────────────────────────────────────────
function drawShape(cx, cy, r, type, rgb) {
  const [red,grn,blu]=rgb;
  ctx.fillStyle=`rgb(${red},${grn},${blu})`;
  ctx.strokeStyle=`rgb(${red},${grn},${blu})`;
  if (type===0) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  } else if (type===1) {
    ctx.fillRect(cx-r*0.9,cy-r*0.9,r*1.8,r*1.8);
  } else if (type===2) {
    ctx.beginPath();
    ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy);
    ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy);
    ctx.closePath(); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.lineWidth=Math.max(1,r*0.38); ctx.stroke();
  }
}

// ── 하프톤 베이스 레이어 ───────────────────────────
function drawHalftoneBase(pix, bw, bh, minX, minY, maxX, maxY) {
  const GRID=11;
  for (let gy=minY; gy<maxY; gy+=GRID) {
    for (let gx=minX; gx<maxX; gx+=GRID) {
      const cx2=gx+GRID/2, cy2=gy+GRID/2;
      let rS=0,gS=0,bS=0,n=0;
      for (let sy=-1;sy<=1;sy++) for (let sx=-1;sx<=1;sx++) {
        const px=Math.min(bw-1,Math.max(0,Math.round(cx2-minX+sx)));
        const py=Math.min(bh-1,Math.max(0,Math.round(cy2-minY+sy)));
        const idx=(py*bw+px)*4;
        rS+=pix[idx]; gS+=pix[idx+1]; bS+=pix[idx+2]; n++;
      }
      const lum=(0.299*(rS/n)+0.587*(gS/n)+0.114*(bS/n))/255;
      const dotR=(1-lum)*(GRID*0.52);
      if (dotR<0.5) continue;
      const col=thermalColor(lum);
      const shape=lum>0.74?2:lum>0.50?3:lum>0.27?0:1;
      drawShape(cx2,cy2,dotR,shape,col);
    }
  }
}

// ── 바이너리 텍스트 오버레이 ─────────────────────────────────
function cellBit(col,row){
  return ((col*1664525+row*1013904223)&0x7fffffff)%2;
}
function drawBinaryOverlay(pix,bw,bh,minX,minY,maxX,maxY){
  const CELL=11;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const cols=Math.floor(bw/CELL), rows=Math.floor(bh/CELL);
  for (let row=0;row<rows;row++) {
    for (let col=0;col<cols;col++) {
      const sx=col*CELL+CELL/2, sy=row*CELL+CELL/2;
      const px=Math.min(bw-1,Math.round(sx));
      const py=Math.min(bh-1,Math.round(sy));
      const idx=(py*bw+px)*4;
      const lum=(0.299*pix[idx]+0.587*pix[idx+1]+0.114*pix[idx+2])/255;
      const c2=lum<0.5?2*lum*lum:1-Math.pow(-2*lum+2,2)/2;
      const dark=1-c2;
      if (dark<0.3) continue;
      const fontSize=Math.round(3+dark*CELL*0.85);
      const alpha=0.25+dark*0.65;
      ctx.fillStyle=`rgba(0,0,0,${alpha})`;
      ctx.font=`bold ${fontSize}px 'Courier New',monospace`;
      ctx.fillText(cellBit(col,row),minX+sx,minY+sy);
    }
  }
}

// ── 메인 박스 렌더 ───────────────────────────────────────────
function renderHalftone(c) {
  const W=mainCanvas.width, H=mainCanvas.height;
  offCtx.save();
  offCtx.translate(W,0); offCtx.scale(-1,1);
  offCtx.drawImage(video,0,0,W,H);
  offCtx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(c.lt.x,c.lt.y); ctx.lineTo(c.rt.x,c.rt.y);
  ctx.lineTo(c.rb.x,c.rb.y); ctx.lineTo(c.lb.x,c.lb.y);
  ctx.closePath();
  ctx.fillStyle='#ff28b4'; ctx.fill(); ctx.clip();

  const xs=[c.lt.x,c.rt.x,c.lb.x,c.rb.x], ys=[c.lt.y,c.rt.y,c.lb.y,c.rb.y];
  const minX=Math.max(0,Math.floor(Math.min(...xs)));
  const minY=Math.max(0,Math.floor(Math.min(...ys)));
  const maxX=Math.min(W,Math.ceil(Math.max(...xs)));
  const maxY=Math.min(H,Math.ceil(Math.max(...ys)));
  const bw=maxX-minX, bh=maxY-minY;
  if (bw<4||bh<4){ctx.restore();return;}

  const imgData=offCtx.getImageData(minX,minY,bw,bh);
  const pix=imgData.data;
  drawHalftoneBase(pix,bw,bh,minX,minY,maxX,maxY);
  drawBinaryOverlay(pix,bw,bh,minX,minY,maxX,maxY);
  ctx.restore();
}

// ── 손 스켈레톤 ───────────────────────────────────────────────
const CONN=[
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17],
];
function drawSkeleton(lm,W,H,lc,tc){
  const mx=p=>((1-p.x)*W), my=p=>(p.y*H);
  ctx.save(); ctx.strokeStyle=lc; ctx.lineWidth=1.5;
  CONN.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(mx(lm[a]),my(lm[a])); ctx.lineTo(mx(lm[b]),my(lm[b])); ctx.stroke();
  });
  lm.forEach((p,i)=>{
    const tip=[4,8,12,16,20].includes(i);
    ctx.beginPath(); ctx.arc(mx(p),my(p),tip?6:3,0,Math.PI*2);
    ctx.fillStyle=tip?tc:lc; ctx.fill();
  });
  ctx.restore();
}

// ── 상태 ──────────────────────────────────────────────────────
let rawCorners=null, smoothCorners=null;
const SMOOTH=0.12, lerp=(a,b,t)=>({x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t});
let hasHands=false, currentLandmarks=[];

// ── 메인 루프 ─────────────────────────────────────────────────
function render(){
  requestAnimationFrame(render);
  const W=mainCanvas.width, H=mainCanvas.height;
  drawBackground(); ctx.clearRect(0,0,W,H);
  if(rawCorners){
    if(!smoothCorners) smoothCorners={...rawCorners};
    else smoothCorners={
      lt:lerp(smoothCorners.lt,rawCorners.lt,SMOOTH),
      rt:lerp(smoothCorners.rt,rawCorners.rt,SMOOTH),
      lb:lerp(smoothCorners.lb,rawCorners.lb,SMOOTH),
      rb:lerp(smoothCorners.rb,rawCorners.rb,SMOOTH),
    };
  }
  if(hasHands&&smoothCorners) renderHalftone(smoothCorners);
  currentLandmarks.forEach((lm,hi)=>drawSkeleton(lm,W,H,
    hi===0?'rgba(180,255,0,0.4)':'rgba(0,210,255,0.4)',
    hi===0?'#c8ff00':'#00d2ff'));
}
requestAnimationFrame(render);

// ── MediaPipe Hands (Camera utils 없이 직접 루프) ────────────
const handsDetector=new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
handsDetector.setOptions({
  maxNumHands:2, modelComplexity:isMobile?0:1,
  minDetectionConfidence:0.7, minTrackingConfidence:0.6,
});

handsDetector.onResults((results)=>{
  loadingEl.style.display='none';
  const W=mainCanvas.width, H=mainCanvas.height;
  if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0){
    hasHands=false; rawCorners=null; currentLandmarks=[]; return;
  }
  currentLandmarks=results.multiHandLandmarks;

  if(results.multiHandLandmarks.length===2){
    const lm0=results.multiHandLandmarks[0];
    const lm1=results.multiHandLandmarks[1];
    const w0=lm0[0].x, w1=lm1[0].x;
    const sL=w0<w1?lm0:lm1, sR=w0<w1?lm1:lm0;
    rawCorners={
      lt:{x:(1-sL[8].x)*W,y:sL[8].y*H},
      rt:{x:(1-sR[8].x)*W,y:sR[8].y*H},
      lb:{x:(1-sL[4].x)*W,y:sL[4].y*H},
      rb:{x:(1-sR[4].x)*W,y:sR[4].y*H},
    };
    hasHands=true;
  } else {
    const lm=results.multiHandLandmarks[0];
    const th={x:(1-lm[4].x)*W,y:lm[4].y*H};
    const ix={x:(1-lm[8].x)*W,y:lm[8].y*H};
    rawCorners={
      lt:{x:Math.min(th.x,ix.x),y:Math.min(th.y,ix.y)},
      rt:{x:Math.max(th.x,ix.x),y:Math.min(th.y,ix.y)},
      lb:{x:Math.min(th.x,ix.x),y:Math.max(th.y,ix.y)},
      rb:{x:Math.max(th.x,ix.x),y:Math.max(th.y,ix.y)},
    };
    hasHands=true;
  }
});

// ── 카메라 → MediaPipe 프레임 루프 ──────────────────────────
async function processFrame() {
  if (video.readyState >= 2) {
    await handsDetector.send({ image: video });
  }
  requestAnimationFrame(processFrame);
}

// ── 시작 ──────────────────────────────────────────────────────
startCamera().then(()=>{
  processFrame();
});
</script>
</body>
</html>
